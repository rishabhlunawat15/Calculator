<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="calculator.css">
    <title>My calculator</title>
</head>
<body>
    <div id="calculator">
        <input type="text" id="display" readonly>
        <div class="buttoncontainer">
        <button class="buttonclass" onclick="currentDisp='';document.querySelector('#display').value=currentDisp;">C</button>
        <button class="buttonclass" onclick="currentDisp+='1';document.querySelector('#display').value=currentDisp;">1</button>
        <button class="buttonclass"onclick="currentDisp+='2';document.querySelector('#display').value=currentDisp;">2</button>
        </div>
        <div class="buttoncontainer">
        <button class="buttonclass"onclick="currentDisp+='3';document.querySelector('#display').value=currentDisp;">3</button>
        <button class="buttonclass"onclick="currentDisp+='4';document.querySelector('#display').value=currentDisp;">4</button>
        <button class="buttonclass"onclick="currentDisp+='5';document.querySelector('#display').value=currentDisp;">5</button>
        </div>
        <div class="buttoncontainer">
        <button class="buttonclass"onclick="currentDisp+='6';document.querySelector('#display').value=currentDisp;">6</button>
        <button class="buttonclass"onclick="currentDisp+='7';document.querySelector('#display').value=currentDisp;">7</button>
        <button class="buttonclass"onclick="currentDisp+='8';document.querySelector('#display').value=currentDisp;">8</button>
        </div>
        <div class="buttoncontainer">
        <button class="buttonclass"onclick="currentDisp+='0';document.querySelector('#display').value=currentDisp;">0</button>
        <button class="buttonclass"onclick="currentDisp+='9';document.querySelector('#display').value=currentDisp;">9</button>
        <button class="buttonclass"onclick="let result=eval(currentDisp);currentDisp=result;document.querySelector('#display').value=currentDisp;">=</button>
        </div>
        <div class="buttoncontainer">
        <button class="buttonclass"onclick="currentDisp+='+';document.querySelector('#display').value=currentDisp;">+</button>
        <button class="buttonclass"onclick="currentDisp+='-';document.querySelector('#display').value=currentDisp;">-</button>
        <button class="buttonclass"onclick="currentDisp+='*';document.querySelector('#display').value=currentDisp;">*</button>
        </div>
        <div class="buttoncontainer">
        <button class="buttonclass"onclick="currentDisp+='.';document.querySelector('#display').value=currentDisp;">.</button>
        <button class="buttonclass"onclick="currentDisp+='/';document.querySelector('#display').value=currentDisp;">/</button>
        </div>
        
    </div>
    <script>
        let currentDisp='';
        document.querySelector('#display').value=currentDisp;
    </script>
</body>
</html>
